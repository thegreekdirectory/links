<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex">
  <title>TGD Link Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .fade-in { animation: fadeIn 0.18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .modal-backdrop { backdrop-filter: blur(2px); }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

  <header class="border-b border-slate-800 px-6 py-3 flex items-center justify-between sticky top-0 z-30 bg-slate-950/95 backdrop-blur">
    <div class="flex items-center gap-3">
      <img src="https://social.thegreekdirectory.org/Logo2.png" class="w-8 h-8 object-contain" alt="Logo">
      <h1 class="font-semibold tracking-tight">TGD Link Admin</h1>
    </div>
    <div id="authNav" class="hidden flex items-center gap-4">
      <span id="userDisplay" class="text-xs text-slate-500 mono hidden sm:inline"></span>
      <button onclick="logout()" class="text-xs font-medium text-slate-400 hover:text-white transition-colors">Sign Out</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <div id="loginView" class="max-w-md mx-auto mt-20 fade-in">
      <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl">
        <h2 class="text-xl font-semibold mb-6">Administrator Login</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Access Token</label>
            <input type="password" id="tokenInput" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors mono" placeholder="••••••••••••">
          </div>
          <button onclick="login()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20">Authorize</button>
        </div>
      </div>
    </div>

    <div id="dashboardView" class="hidden space-y-8 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div class="relative flex-1 max-w-md">
          <input type="text" id="searchInput" class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-slate-600 transition-colors" placeholder="Search links...">
          <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <button onclick="openModal()" class="bg-white text-slate-950 hover:bg-slate-200 font-semibold px-5 py-2.5 rounded-xl text-sm transition-all flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Shortlink
        </button>
      </div>

      <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead class="bg-slate-800/50 text-slate-400 font-medium border-b border-slate-800">
              <tr>
                <th class="px-6 py-4">Path</th>
                <th class="px-6 py-4">Redirect Destination</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="linksTable" class="divide-y divide-slate-800">
              </tbody>
          </table>
        </div>
      </div>

      <div class="space-y-4 pt-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Recent Activity
          </h2>
          <button onclick="loadAnalytics()" class="text-xs text-slate-500 hover:text-slate-300 mono uppercase tracking-widest">Refresh Stats</button>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-slate-800/50 text-slate-400 font-medium border-b border-slate-800">
                <tr>
                  <th class="px-6 py-4">Path</th>
                  <th class="px-6 py-4">Location</th>
                  <th class="px-6 py-4">Details</th>
                  <th class="px-6 py-4">Time</th>
                </tr>
              </thead>
              <tbody id="analyticsTable" class="divide-y divide-slate-800">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-slate-950/60">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl shadow-2xl p-8 fade-in">
      <h3 class="text-xl font-semibold mb-6">Create New Shortlink</h3>
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Short Path (must start with /)</label>
          <input type="text" id="newPath" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors mono" placeholder="/my-link">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Target URL</label>
          <input type="text" id="newUrl" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors mono" placeholder="https://...">
        </div>
        <div class="flex gap-3 pt-4">
          <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl border border-slate-800 text-sm font-medium hover:bg-slate-800 transition-colors">Cancel</button>
          <button onclick="addLink()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-all">Save Link</button>
        </div>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-slate-950/40">
    <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center fade-in">
      <div class="w-12 h-12 bg-red-900/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </div>
      <h3 class="text-lg font-semibold mb-2">Delete Shortlink?</h3>
      <p class="text-slate-400 text-sm mb-6">This action cannot be undone. Clicks to this path will stop working.</p>
      <div class="flex gap-3">
        <button onclick="closeDeleteModal()" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-800 text-sm font-medium hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="confirmDeleteBtn" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-medium py-2.5 rounded-xl transition-all">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://luetekzqrrgdxtopzvqw.supabase.co";
    let supabase = null;
    let allLinks = [];

    // --- AUTH ---
    function login() {
      const key = document.getElementById("tokenInput").value;
      if (!key) return toast("Token required", "error");
      
      try {
        supabase = supabase.createClient(SUPABASE_URL, key);
        localStorage.setItem("tgd_token", key);
        checkAuth();
      } catch(e) { toast("Invalid configuration", "error"); }
    }

    async function checkAuth() {
      const stored = localStorage.getItem("tgd_token");
      if (!stored) return;
      
      supabase = supabase.createClient(SUPABASE_URL, stored);
      const { data, error } = await supabase.from("shortlinks").select("count", { count: 'exact', head: true });
      
      if (error) {
        localStorage.removeItem("tgd_token");
        return;
      }

      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("dashboardView").classList.remove("hidden");
      document.getElementById("authNav").classList.remove("hidden");
      loadData();
      loadAnalytics();
    }

    function logout() {
      localStorage.removeItem("tgd_token");
      window.location.reload();
    }

    // --- DATA ---
    async function loadData() {
      const { data, error } = await supabase.from("shortlinks").select("*").order("path");
      if (error) return toast("Error loading links", "error");
      allLinks = data;
      render();
    }

    async function loadAnalytics() {
      const { data, error } = await supabase.from("shortlink_events").select("*").order("event_time", { ascending: false }).limit(40);
      if (error) return console.error("Analytics fetch fail", error);
      renderAnalytics(data);
    }

    function render() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      const filtered = allLinks.filter(l => l.path.toLowerCase().includes(q) || l.redirect_to.toLowerCase().includes(q));
      
      const tbody = document.getElementById("linksTable");
      tbody.innerHTML = filtered.map(l => `
        <tr class="hover:bg-slate-800/30 transition-colors group">
          <td class="px-6 py-4 font-medium text-blue-400 mono">${l.path}</td>
          <td class="px-6 py-4 max-w-xs truncate text-slate-400 mono text-xs">${l.redirect_to}</td>
          <td class="px-6 py-4 text-right space-x-3">
            <button onclick="copyToClipboard('https://tgd.gr${l.path}')" class="text-slate-500 hover:text-white transition-colors p-1" title="Copy Link">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            </button>
            <button onclick="openDeleteModal('${l.path}')" class="text-slate-500 hover:text-red-400 transition-colors p-1" title="Delete">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </td>
        </tr>
      `).join("");
    }

    function renderAnalytics(events) {
      const tbody = document.getElementById("analyticsTable");
      tbody.innerHTML = events.map(e => {
        const date = new Date(e.event_time).toLocaleString('en-GB', { hour12: false });
        const location = `${e.city || '?'}, ${e.region || '?'}, ${e.country || '?'}`;
        return `
          <tr class="text-xs border-slate-800">
            <td class="px-6 py-3 font-medium text-slate-300 mono">${e.path}</td>
            <td class="px-6 py-3 text-slate-400">
              <div class="font-medium text-slate-300">${e.city || 'Unknown'}</div>
              <div class="opacity-60 text-[10px]">${e.region ? e.region + ', ' : ''}${e.country || ''}</div>
            </td>
            <td class="px-6 py-3 text-slate-500 mono max-w-[200px]">
              <div class="truncate text-blue-400/80 mb-0.5">${e.ip || 'no-ip'}</div>
              <div class="text-[9px] truncate opacity-50">${e.timezone || ''}</div>
              <div class="text-[9px] truncate opacity-50 italic">${e.user_agent || ''}</div>
            </td>
            <td class="px-6 py-3 text-slate-500 mono whitespace-nowrap">${date}</td>
          </tr>
        `;
      }).join("");
    }

    // --- ACTIONS ---
    async function addLink() {
      const path = document.getElementById("newPath").value.trim();
      const url = document.getElementById("newUrl").value.trim();
      
      if (!path.startsWith("/")) return toast("Path must start with /", "error");
      if (!url.startsWith("http")) return toast("Invalid Target URL", "error");

      const { error } = await supabase.from("shortlinks").insert([{ path, redirect_to: url }]);
      if (error) return toast("Error: " + error.message, "error");

      toast("Link created successfully", "ok");
      closeModal();
      loadData();
    }

    function openDeleteModal(path) {
      document.getElementById("deleteModal").classList.remove("hidden");
      document.getElementById("confirmDeleteBtn").onclick = async () => {
        const { error } = await supabase.from("shortlinks").delete().eq("path", path);
        if (error) return toast("Delete failed", "error");
        toast("Deleted /" + path, "info");
        closeDeleteModal();
        loadData();
      };
    }

    // --- HELPERS ---
    function openModal() { document.getElementById("modal").classList.remove("hidden"); }
    function closeModal() { document.getElementById("modal").classList.add("hidden"); }
    function closeDeleteModal() { document.getElementById("deleteModal").classList.add("hidden"); }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
      toast("Copied to clipboard", "ok");
    }

    function toast(msg, type = "info") {
      const el = document.getElementById("toast");
      const colors = { ok: "border-green-500 text-green-400", error: "border-red-500 text-red-400", info: "border-slate-600 text-slate-300" };
      el.className = `fixed bottom-5 right-5 z-50 bg-slate-800 border text-sm rounded-xl px-4 py-3 shadow-xl mono fade-in ${colors[type]}`;
      el.textContent = msg; el.classList.remove("hidden");
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.add("hidden"), 3500);
    }

    document.getElementById("searchInput").addEventListener("input", render);
    document.getElementById("tokenInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
    window.onclick = e => {
      if (e.target.id === "modal") closeModal();
      if (e.target.id === "deleteModal") closeDeleteModal();
    };

    checkAuth();
  </script>
</body>
</html>
