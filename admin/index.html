<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Redirect Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto bg-white shadow rounded p-6">

<h1 class="text-2xl font-bold mb-4">Redirect Admin</h1>

<div id="loginBox" class="mb-6">
<input id="tokenInput" type="password"
placeholder="GitHub Personal Access Token"
class="border p-2 w-full mb-2">

<button onclick="login()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Login
</button>
</div>

<div id="controls" class="hidden mb-4 flex gap-2 items-center">

<input id="searchInput" placeholder="Search..."
class="border p-2 flex-1">

<input type="file" id="csvInput" accept=".csv"
class="border p-2">

<button onclick="importCSV()"
class="bg-purple-600 text-white px-4 py-2 rounded">
Import CSV
</button>

<button onclick="openNew()"
class="bg-green-600 text-white px-4 py-2 rounded">
New Link
</button>

<button onclick="loadLinks()"
class="bg-gray-600 text-white px-4 py-2 rounded">
Refresh
</button>

</div>

<div id="list" class="space-y-2"></div>

<div class="mt-10">

<div class="flex items-center justify-between mb-3">
<h2 class="text-xl font-semibold">Analytics Summary</h2>

<button onclick="loadAnalyticsSummary()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Refresh Analytics
</button>
</div>

<div id="analyticsStatus" class="text-sm text-gray-600 mb-3">
Analytics summary will load after login.
</div>

<div class="overflow-x-auto">

<table class="min-w-full text-sm border">

<thead class="bg-gray-50">
<tr>
<th class="text-left p-2 border">Path</th>
<th class="text-left p-2 border">Total Events</th>
<th class="text-left p-2 border">Last Seen</th>
</tr>
</thead>

<tbody id="analyticsTable"></tbody>

</table>
</div>
</div>
</div>

<script>

/* CONFIG */

const OWNER="thegreekdirectory"
const REPO="links"
const LINKS_JSON="data/links.json"
const TEMPLATE_PATH="_template.html"
const REDIRECT_DIR=""

const SUPABASE_URL="https://luetekzqrrgdxtopzvqw.supabase.co"
const SUPABASE_ANON_KEY="YOURKEY"
const ANALYTICS_TABLE="shortlink_events"

let token=""
let links=[]

/* AUTH */

function login(){

token=tokenInput.value.trim()

if(!token)return alert("Token required")

loginBox.classList.add("hidden")
controls.classList.remove("hidden")

loadLinks()
loadAnalyticsSummary()

}

/* HELPERS */

function gh(path){

return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{

headers:{Authorization:`token ${token}`}

})

}

function requireValidPath(path){

if(!path.startsWith("/")){

alert("Path must start with /")
return false

}

return true

}

function requireValidURL(url){

if(!url.startsWith("https://")){

alert("Redirect URL must start with https://")
return false

}

return true

}

function filePathFromPath(path){

return path.replace(/^\//,"")+".html"

}

/* FETCH METADATA */

async function fetchMetadata(url){

try{

const res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url))

const html=await res.text()

const titleMatch=html.match(/<meta property="og:title" content="([^"]+)"/i)
|| html.match(/<title[^>]*>(.*?)<\/title>/i)

const descMatch=html.match(/<meta property="og:description" content="([^"]+)"/i)
|| html.match(/<meta name="description" content="([^"]+)"/i)

return{

title:titleMatch?titleMatch[1].trim():"Redirecting…",
description:descMatch?descMatch[1].trim():""

}

}catch{

return{

title:"Redirecting…",
description:""

}

}

}

/* LOAD LINKS */

async function loadLinks(){

const res=await gh(LINKS_JSON)
const file=await res.json()

links=JSON.parse(atob(file.content)).links

render()

}

/* RENDER */

function render(){

const q=searchInput.value.toLowerCase()

list.innerHTML=""

links.filter(l=>

(l.title||"").toLowerCase().includes(q) ||
(l.path||"").toLowerCase().includes(q) ||
(l.redirectTo||"").toLowerCase().includes(q)

).forEach(l=>{

list.innerHTML+=`

<div class="border rounded p-3 flex justify-between items-center">

<div>

<div class="font-semibold">${l.title||"(no title)"}</div>

<div class="text-sm text-gray-600">
${l.path} → ${l.redirectTo}
</div>

</div>

<div class="space-x-3">

<button onclick="editLink('${l.id}')" class="text-blue-600">Edit</button>
<button onclick="deleteLink('${l.id}')" class="text-red-600">Delete</button>

</div>

</div>

`

})

}

/* TEMPLATE */

async function loadTemplate(){

const res=await gh(TEMPLATE_PATH)
const file=await res.json()

return atob(file.content)

}

/* WRITE REDIRECT */

async function writeRedirect(path,redirectTo){

const filePath=filePathFromPath(path)

let html=await loadTemplate()

const meta=await fetchMetadata(redirectTo)

html=html.replaceAll("{{TITLE}}",meta.title)
html=html.replaceAll("{{DESCRIPTION}}",meta.description)
html=html.replaceAll("{{REDIRECT_URL}}",redirectTo)

const content=btoa(html)

let sha=null

const check=await gh(filePath)

if(check.ok)sha=(await check.json()).sha

await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`,{

method:"PUT",

headers:{

Authorization:`token ${token}`,
"Content-Type":"application/json"

},

body:JSON.stringify({

message:"Write redirect page",
content,
...(sha&&{sha})

})

})

}

/* SAVE JSON */

async function saveJSON(){

const res=await gh(LINKS_JSON)
const file=await res.json()

await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${LINKS_JSON}`,{

method:"PUT",

headers:{

Authorization:`token ${token}`,
"Content-Type":"application/json"

},

body:JSON.stringify({

message:"Update links.json",
content:btoa(JSON.stringify({links},null,2)),
sha:file.sha

})

})

loadLinks()

}

/* CRUD */

async function openNew(){

const redirectTo=prompt("Redirect URL (https://...)")

if(!redirectTo)return

if(!requireValidURL(redirectTo))return

const meta=await fetchMetadata(redirectTo)

const title=prompt("Title",meta.title)
const path=prompt("Path (/anything)")

if(!title||!path)return

if(!requireValidPath(path))return

const link={

id:crypto.randomUUID(),
title,
path,
redirectTo

}

links.push(link)

await writeRedirect(path,redirectTo)

await saveJSON()

}

/* ANALYTICS */

function formatTimestamp(value){

if(!value)return "—"

const date=new Date(value)

if(Number.isNaN(date.getTime()))return value

return date.toLocaleString()

}

async function loadAnalyticsSummary(){

analyticsStatus.textContent="Loading analytics summary..."

analyticsTable.innerHTML=""

const url=new URL(`${SUPABASE_URL}/rest/v1/${ANALYTICS_TABLE}`)

url.searchParams.set("select","path,count:count(),last_seen:max(event_time)")
url.searchParams.set("group","path")
url.searchParams.set("order","last_seen.desc")

try{

const res=await fetch(url.toString(),{

headers:{

apikey:SUPABASE_ANON_KEY,
Authorization:`Bearer ${SUPABASE_ANON_KEY}`

}

})

if(!res.ok)throw new Error()

const data=await res.json()

if(!data.length){

analyticsStatus.textContent="No analytics events yet."
return

}

const totalEvents=data.reduce((sum,i)=>sum+Number(i.count||0),0)

analyticsStatus.textContent=`Loaded ${totalEvents} events across ${data.length} paths.`

analyticsTable.innerHTML=data.map(item=>`

<tr>
<td class="p-2 border font-mono text-xs">${item.path}</td>
<td class="p-2 border">${item.count}</td>
<td class="p-2 border">${formatTimestamp(item.last_seen)}</td>
</tr>

`).join("")

}catch{

analyticsStatus.textContent="Failed to load analytics summary."

}

}

searchInput.addEventListener("input",render)

</script>

</body>
</html>
