<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting to {{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:type" content="website">
<meta name="shortlink-redirect" content="{{REDIRECT_URL}}">
<script src="/analytics.js" data-redirect="{{REDIRECT_URL}}" defer></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="https://static.thegreekdirectory.org/img/logo/bluefavicon.png">
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center px-4">
  <div class="text-center space-y-4 max-w-sm w-full">
    <img src="https://social.thegreekdirectory.org/Logo2.png" alt="The Greek Directory" class="w-14 h-auto mx-auto opacity-90">
    <p class="text-slate-400 text-sm font-mono">Redirecting you to</p>
    <a href="{{REDIRECT_URL}}"
       class="text-white text-base font-medium underline underline-offset-2 decoration-slate-600 hover:decoration-white transition-all break-all">
      {{REDIRECT_URL}}
    </a>
    <div class="pt-2">
      <div class="w-32 h-0.5 bg-slate-800 rounded-full mx-auto overflow-hidden">
        <div class="h-full bg-blue-500 rounded-full animate-[progress_0.6s_linear_forwards]"></div>
      </div>
    </div>
  </div>
  <style>
    @keyframes progress {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</body>
</html>
